name: Cleanup old deployments

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete pre-Fextive Blog deployments
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          OLD_DEPLOYMENT_IDS: 780154951 778853682 777865022 776537343 776533045 774379391 773841958 773783024 773733916
        run: |
          set -euo pipefail

          for deployment_id in $OLD_DEPLOYMENT_IDS; do
            echo "Inactivating deployment ${deployment_id}"
            curl --fail-with-body --silent --show-error \
              --request POST \
              --url "https://api.github.com/repos/${REPO}/deployments/${deployment_id}/statuses" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              --data '{"state":"inactive"}'

            echo "Deleting deployment ${deployment_id}"
            curl --fail-with-body --silent --show-error \
              --request DELETE \
              --url "https://api.github.com/repos/${REPO}/deployments/${deployment_id}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28"
          done
